name: 'Terraform'

on:
  workflow_dispatch:
    inputs:
      ip:
        description: 'IP Address'
        required: true
        type: string

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      working-directory: terraform
      run: terraform init
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    - name: Terraform Format
      working-directory: terraform
      run: terraform fmt -check

    - name: Terraform Plan
      working-directory: terraform
      run: terraform plan -var="zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}" -var="server_ipv4=${{ github.event.inputs.ip }}"

    - name: Terraform Apply
      if: github.event_name == 'repository_dispatch'
      working-directory: terraform
      run: terraform apply -var="zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}" -var="server_ipv4=${{ github.event.inputs.ip }}" -auto-approve

    - name: Post deployment summary
      if: always()
      run: |
        echo "Deployment completed" >> $GITHUB_STEP_SUMMARY
